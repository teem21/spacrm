<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPA CRM</title>
  
  <!-- Modern Typography (Inter & Poppins) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Modern Warm Minimalist Palette */
      --bg-color: #fbfaee; /* Creamy off-white background */
      --surface-container-low: #f5f4e8;
      --surface-container: #efeee3;
      --surface-container-high: #e9e9dd;
      --surface-container-highest: #e4e3d7;
      
      --accent-color: #fdc003; /* Vibrant honey-yellow */
      --primary-color: #5f5e5e; /* Deep charcoal (for text/primary actions) */
      --secondary-color: #785900;
      
      --text-main: #1b1c15; /* Charcoal black for readability */
      --text-sub: #4f4632;
      
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-pill: 9999px;
      
      --glow-gradient: radial-gradient(circle at top left, rgba(255, 253, 231, 0.8) 0%, rgba(251, 250, 238, 0) 50%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      background: var(--bg-color); 
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      -webkit-text-size-adjust: 100%; 
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Radial Glow Background */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--glow-gradient);
      pointer-events: none;
      z-index: -1;
    }

    /* Glassmorphism Classes */
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    /* Bento Grid Utils */
    .bento-grid {
      display: grid;
      gap: 32px;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    }

    @media (max-width: 767px) {
      body { -webkit-overflow-scrolling: touch; }
      input, select, textarea { font-size: 16px !important; }
      .bento-grid { gap: 16px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 (production) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Lucide vanilla (for icon SVG data) -->
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>

  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- Supabase-backed Storage Adapter -->
  <script>
    const SUPABASE_URL = 'https://uzjeunhutriqalzucgpe.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6amV1bmh1dHJpcWFsenVjZ3BlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MDAxNzYsImV4cCI6MjA4OTI3NjE3Nn0._17Iv4Vav439wpzEUD8jsQ8UoflBKMh1e-EqyWmwPt4';

    window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ── camelCase ↔ snake_case helpers ──
    function toSnake(s) { return s.replace(/([A-Z])/g, '_$1').toLowerCase(); }
    function toCamel(s) { return s.replace(/_([a-z])/g, (_, c) => c.toUpperCase()); }
    function objToSnake(o) {
      if (!o || typeof o !== 'object' || Array.isArray(o)) return o;
      const out = {};
      for (const k in o) out[toSnake(k)] = o[k];
      return out;
    }
    function objToCamel(o) {
      if (!o || typeof o !== 'object' || Array.isArray(o)) return o;
      const out = {};
      for (const k in o) out[toCamel(k)] = o[k];
      return out;
    }

    // ── Parse storage key → { table, filters } ──
    function parseKey(key) {
      if (key === 'spa-crm:salons') return { table: 'salons' };
      if (key === 'spa-crm:users') return { table: 'profiles' };
      if (key === 'spa-crm:activity-logs') return { table: 'activity_logs' };
      if (key === 'spa-crm:current-user') return { table: '__session__' };

      const procMatch = key.match(/^spa-crm:procedures:(.+)$/);
      if (procMatch) return { table: 'procedures', filters: { salon_id: procMatch[1] } };

      const comboMatch = key.match(/^spa-crm:combos:(.+)$/);
      if (comboMatch) return { table: 'combos', filters: { salon_id: comboMatch[1] } };

      const bookMatch = key.match(/^spa-crm:bookings:([^:]+):(\d{4}-\d{2})$/);
      if (bookMatch) return { table: 'bookings', filters: { salon_id: bookMatch[1], ym: bookMatch[2] } };

      return null;
    }

    // ── Date helpers for month range ──
    function ymToRange(ym) {
      const [y, m] = ym.split('-').map(Number);
      const from = ym + '-01';
      const lastDay = new Date(y, m, 0).getDate();
      const to = ym + '-' + String(lastDay).padStart(2, '0');
      return { from, to };
    }

    // ── Supabase Storage Adapter ──
    // Implements the same { get, set, delete, list } API the app expects
    (function() {
    const sb = window.supabaseClient;

    // Known columns per table — only these are sent to Supabase
    const TABLE_COLS = {
      salons: ['id','name','rooms','therapist_count','therapists','has_sauna','sauna_capacity','sauna_duration','has_peeling','peeling_max_per_hour','peeling_masters_max','peeling_time_per_person','work_start','work_end','day_off','buffer_minutes'],
      procedures: ['id','salon_id','name','category','duration','price','therapists_required','is_active'],
      combos: ['id','salon_id','name','steps','price','total_duration','is_active'],
      bookings: ['id','salon_id','date','client_name','client_phone','client_count','booking_type','procedure_id','combo_id','segments','total_start_time','total_end_time','total_price','status','created_at','notes','master_name','payment_method'],
      activity_logs: ['id','user_id','user_name','action','target_date','target_time','client_name','details','timestamp'],
    };
    function pickCols(table, obj) {
      var cols = TABLE_COLS[table];
      if (!cols) return obj;
      var out = {};
      for (var i = 0; i < cols.length; i++) {
        if (obj[cols[i]] !== undefined) out[cols[i]] = obj[cols[i]];
      }
      return out;
    }

    window.storage = {
      async get(key) {
        const parsed = parseKey(key);
        if (!parsed) return null;

        // Session: handled by Supabase Auth
        if (parsed.table === '__session__') {
          const { data: { session } } = await sb.auth.getSession();
          if (!session) return null;
          const { data: profile } = await sb.from('profiles')
            .select('*').eq('id', session.user.id).single();
          if (!profile) return null;
          const user = { id: profile.id, name: profile.name, login: profile.login, role: profile.role };
          return { value: JSON.stringify(user) };
        }

        let query = sb.from(parsed.table).select('*');

        if (parsed.filters) {
          if (parsed.filters.salon_id) query = query.eq('salon_id', parsed.filters.salon_id);
          if (parsed.filters.ym) {
            const range = ymToRange(parsed.filters.ym);
            query = query.gte('date', range.from).lte('date', range.to);
          }
        }

        if (parsed.table === 'activity_logs') query = query.order('timestamp', { ascending: false });

        const { data, error } = await query;
        if (error) { console.error('Supabase get error:', error); return null; }
        if (!data || data.length === 0) return { value: JSON.stringify([]) };

        // Convert snake_case → camelCase
        const camelData = data.map(row => {
          const c = objToCamel(row);
          // Preserve JSONB fields as-is (rooms, therapists, steps, segments)
          if (row.rooms !== undefined) c.rooms = row.rooms;
          if (row.therapists !== undefined) c.therapists = row.therapists;
          if (row.steps !== undefined) c.steps = row.steps;
          if (row.segments !== undefined) c.segments = row.segments;
          return c;
        });
        return { value: JSON.stringify(camelData) };
      },

      async set(key, value) {
        const parsed = parseKey(key);
        if (!parsed) return;

        // Session: handled by Supabase Auth (no-op here, login sets it)
        if (parsed.table === '__session__') return;

        const items = JSON.parse(value);
        if (!Array.isArray(items)) return;

        // Convert camelCase → snake_case for each row
        const snakeItems = items.map(item => {
          const s = objToSnake(item);
          // Preserve JSONB fields
          if (item.rooms !== undefined) s.rooms = item.rooms;
          if (item.therapists !== undefined) s.therapists = item.therapists;
          if (item.steps !== undefined) s.steps = item.steps;
          if (item.segments !== undefined) s.segments = item.segments;
          return s;
        });

        // Filter to known columns only (prevents 400 from unknown fields)
        const cleanItems = snakeItems.map(item => pickCols(parsed.table, item));

        if (parsed.table === 'profiles') {
          return;
        } else if (parsed.table === 'activity_logs') {
          // Logs: append only — find new entries and insert them
          const { data: existing } = await sb.from('activity_logs').select('id');
          const existingIds = new Set((existing || []).map(e => e.id));
          const newItems = cleanItems.filter(i => !existingIds.has(i.id));
          if (newItems.length > 0) {
            const { error } = await sb.from('activity_logs').insert(newItems);
            if (error) console.error('Supabase log insert error:', error);
          }
          return;
        }

        // For partitioned data (procedures, combos, bookings per salon/month),
        // delete rows no longer in the list, then upsert current rows
        if (parsed.filters) {
          // Get existing IDs so we can delete removed rows
          let selQuery = sb.from(parsed.table).select('id');
          if (parsed.filters.salon_id) selQuery = selQuery.eq('salon_id', parsed.filters.salon_id);
          if (parsed.filters.ym) {
            const range = ymToRange(parsed.filters.ym);
            selQuery = selQuery.gte('date', range.from).lte('date', range.to);
          }
          const { data: existing } = await selQuery;
          const newIds = new Set(cleanItems.map(i => i.id));
          const toDelete = (existing || []).filter(e => !newIds.has(e.id)).map(e => e.id);
          if (toDelete.length > 0) {
            const { error: delErr } = await sb.from(parsed.table).delete().in('id', toDelete);
            if (delErr) { console.error('Supabase delete error:', delErr); throw delErr; }
          }
        }

        if (cleanItems.length === 0) return;

        // Upsert for all tables (handles both new and existing rows)
        var { error } = await sb.from(parsed.table).upsert(cleanItems, { onConflict: 'id' });
        // If salons upsert fails (e.g. 'therapists' column missing), retry without it
        if (error && parsed.table === 'salons') {
          console.warn('Salons upsert failed, retrying without therapists column:', error.message);
          var fallback = cleanItems.map(function(item) {
            var o = {}; for (var k in item) { if (k !== 'therapists') o[k] = item[k]; } return o;
          });
          var r2 = await sb.from('salons').upsert(fallback, { onConflict: 'id' });
          if (r2.error) { console.error('Supabase upsert error (retry):', r2.error); throw r2.error; }
          error = null;
        }
        if (error) { console.error('Supabase upsert error:', error); throw error; }
      },

      async delete(key) {
        const parsed = parseKey(key);
        if (!parsed) return;
        if (parsed.table === '__session__') {
          await sb.auth.signOut();
          return;
        }
        if (parsed.filters) {
          let query = sb.from(parsed.table).delete();
          if (parsed.filters.salon_id) query = query.eq('salon_id', parsed.filters.salon_id);
          if (parsed.filters.ym) {
            const range = ymToRange(parsed.filters.ym);
            query = query.gte('date', range.from).lte('date', range.to);
          }
          await query;
        }
        // For top-level keys (salons, users, logs) — delete all is dangerous, skip
      },

      async list(prefix) {
        // Only used for "spa-crm:bookings:" — dashboard loads all bookings
        if (prefix === 'spa-crm:bookings:') {
          const { data } = await sb.from('bookings')
            .select('salon_id, date');
          if (!data) return { keys: [] };
          const keySet = new Set();
          data.forEach(row => {
            const ym = row.date.slice(0, 7);
            keySet.add(`spa-crm:bookings:${row.salon_id}:${ym}`);
          });
          return { keys: Array.from(keySet) };
        }
        return { keys: [] };
      }
    };
    })();

    // ── Telegram notification (calls Edge Function) ──
    window.notifyTelegram = function(event, data) {
      try {
        var sb = window.supabaseClient;
        if (!sb) return;
        sb.functions.invoke('telegram-bot', {
          body: { action: 'notify', event: event, data: data },
        }).catch(function() {});
      } catch (e) {}
    };
  </script>

  <!-- Shim: convert vanilla lucide icons into React components -->
  <script>
    (function() {
      // Vanilla lucide exposes icon nodes via lucide.icons
      // Each icon is [name, [["tag", {attrs}], ...]]
      // We wrap them as React components compatible with lucide-react API
      function createReactIcon(iconNode) {
        return function LucideIcon(props) {
          var size = props.size || 24;
          var color = props.color || 'currentColor';
          var strokeWidth = props.strokeWidth || 2;
          var fill = props.fill || 'none';
          var className = props.className || '';
          var style = props.style || {};
          var onClick = props.onClick;

          var children = iconNode.map(function(node, i) {
            var tag = node[0];
            var attrs = Object.assign({}, node[1], { key: i });
            return React.createElement(tag, attrs);
          });

          return React.createElement('svg', {
            xmlns: 'http://www.w3.org/2000/svg',
            width: size,
            height: size,
            viewBox: '0 0 24 24',
            fill: fill,
            stroke: color,
            strokeWidth: strokeWidth,
            strokeLinecap: 'round',
            strokeLinejoin: 'round',
            className: className,
            style: style,
            onClick: onClick
          }, children);
        };
      }

      // Map of icon names used in app.jsx
      var iconNames = [
        'Gem', 'Settings', 'Calendar', 'BookOpen', 'LayoutDashboard',
        'Loader2', 'Plus', 'Trash2', 'ChevronLeft', 'ChevronRight',
        'ChevronUp', 'ChevronDown', 'Check', 'X', 'Moon', 'Phone', 'Search',
        'Users', 'LogOut', 'Shield', 'Eye', 'EyeOff', 'ClipboardList', 'UserPlus', 'Lock', 'Menu',
        'ArrowUp', 'ArrowDown', 'Database', 'Download', 'Upload'
      ];

      // lucide vanilla stores icon data in lucide.icons as { iconName: [nodes] }
      // but the keys are kebab-case, e.g. "book-open", "chevron-left"
      function toKebab(name) {
        return name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase()
                    .replace('layout-dashboard', 'layout-dashboard');
      }

      var lucideReact = {};
      iconNames.forEach(function(name) {
        var kebab = toKebab(name);
        var raw = lucide.icons && (lucide.icons[name] || lucide.icons[kebab]);
        // lucide UMD icons are ["svg", {defaultAttrs}, [children...]] tuples
        var iconData = raw && Array.isArray(raw) && raw.length === 3 && Array.isArray(raw[2]) ? raw[2] : raw;
        if (iconData) {
          lucideReact[name] = createReactIcon(iconData);
        } else {
          // Fallback: empty icon
          console.warn('Lucide icon not found:', name, '(kebab:', kebab, ')');
          lucideReact[name] = function(props) {
            var size = props.size || 24;
            return React.createElement('svg', {
              width: size, height: size, viewBox: '0 0 24 24'
            });
          };
        }
      });

      // Override global lucide with React components
      window.lucide = lucideReact;
    })();
  </script>

  <!-- Pre-built app (JSX compiled at deploy time by esbuild) -->
  <script src="app.js"></script>
  <script>
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(window.App));
  </script>
</body>
</html>
